defaults:
  - _self_ # use default global values below
  - model: bsa_tnp
seed: 42
wandb: True
project: ERA5
train_num_steps: 100000
valid_num_steps: 5000 # exhaust valid dataloader
valid_interval: 5000
plot_interval: 50000
data:
  batch_size: 8
  num_ctx_min_per_t: 45  # ~5% of 900 = 30 * 30
  num_ctx_max_per_t: 225  # ~25% of 900 = 30 * 30
  num_test: 900  # 900 = 30 * 30 = predicted frame
  train_region: central_europe
  valid_region: northern_europe
  test_region: western_europe
  num_batches_per_subset: 50
optimizer:
  _target_: optax.chain
  _args_:
    - _target_: optax.clip_by_global_norm
      max_norm: 0.5
    - _target_: optax.adamw
      learning_rate: 5.0e-4
      b1: 0.9
      b2: 0.999
      weight_decay: 1.0e-4
