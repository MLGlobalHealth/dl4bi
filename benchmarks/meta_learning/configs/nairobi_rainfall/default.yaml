defaults:
  - _self_ # use default global values below
  - model: bsa_tnp
  - data: reduced
seed: 42
wandb: False
project: Nairobi Rainfall
optimizer:
  _target_: optax.chain
  _args_:
    - _target_: optax.clip_by_global_norm
      max_norm: 0.5
    - _target_: optax.adamw
      learning_rate: 1.0e-5
      b1: 0.9
      b2: 0.999
      weight_decay: 1.0e-4
