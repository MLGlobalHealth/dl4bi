
cls: STGTNPKR
kwargs:
  num_blks: 6
  num_reps: 1
  min_std: 0.05
  embed_all:
    cls: MLP
    kwargs:
      dims: [256, 128, 64]
      act_fn: gelu
  dist:
    func: l2_dist
  graph_bias_flag: true
  graph_bias:
    cls: GraphDistanceBias
    kwargs:
      num_heads: 4
  temporal_bias_flag: false
  temporal_bias:
    cls: ExpTemporalBias
    kwargs:
      num_heads: 4
  attn:
    cls: MultiHeadAttention
    kwargs:
      num_heads: 4
      attn:
        cls: FusedAttention
  ffn:
    cls: MLP
    kwargs:
      dims: [256, 64]
      act_fn: gelu
  head:
    cls: MLP
    kwargs:
      dims: [256, 64, 2]
      act_fn: gelu
