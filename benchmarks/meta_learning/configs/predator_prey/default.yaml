defaults:
  - _self_ # use default global values below
  - model: bsa_tnp
seed: 42
wandb: True
project: Predator Prey
train_num_steps: 100000
valid_num_steps: 1000
valid_interval: 10000
data:
  N: 
  batch_size: 64
mcmc:
  num_warmup: 2000
  num_samples: 2000
  num_chains: 4
infer_with_model: False
infer_with_mcmc: False
optimizer:
  _target_: optax.chain
  _args_:
    - _target_: optax.clip_by_global_norm
      max_norm: 0.5
    - _target_: optax.adamw
      learning_rate:
        _target_: optax.cosine_decay_schedule
        init_value: 1.0e-4
        decay_steps: ${train_num_steps}
        alpha: 2.0e-5
      b1: 0.9
      b2: 0.999
      weight_decay: 1.0e-4
