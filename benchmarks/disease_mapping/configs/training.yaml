defaults:
  - _self_ # use default global values below
  - data: generic
  - model: spatial/geo_bsa_tnp
  # kernel specified in code
  # - kernel: rbf 
seed: 42
wandb: True
project: Disease Mapping
train_num_steps: 100000
valid_num_steps: 5000
valid_interval: 10000
plot_interval: 100000
optimizer:
  _target_: optax.chain
  _args_:
    - _target_: optax.clip_by_global_norm
      max_norm: 0.5
    - _target_: optax.adamw
      learning_rate:
        _target_: optax.cosine_decay_schedule
        init_value: 1.0e-4
        decay_steps: ${train_num_steps}
        alpha: 2.0e-5
      b1: 0.9
      b2: 0.999
      weight_decay: 1.0e-4

# The following input formats are available, with the last two useful for evaluation.
# survey -> [n_pos, n] 
# theta -> [n_pos / n] 
# z -> expit(n_pos / n)
# z_cheat -> z, 
# theta_cheat -> theta
input_format: "survey" 
output_format: "z" # theta or z