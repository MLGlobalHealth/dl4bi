hydra:
  job:
    chdir: True

task:
  name: sine
  kwargs:
    num_context: 50
    num_test: 50
    min_s: 0.0
    max_s: 1.0
    min_s_train: 0.0
    max_s_train: 0.2
    frequency: 15

shared:
  pe_cls: FixedSinusoidalEmbedding
  pe_dim: 16
  embed_dim: 128
  dec_dims: ${eval:'[${.embed_dim} * n for n in [3, 2, 1]]'}
  post_process_dims: ${eval:'[${.embed_dim} * 2] * 4 + [${.embed_dim}]'}

model:
  cls: AttentiveNeuralProcess
  kwargs:
    embed_s:
      cls: LearnableEmbedding
      kwargs:
        map:
          cls: ${shared.pe_cls}
          kwargs: 
            embed_dim: ${shared.pe_dim}
        post_process:
          cls: MLP
          kwargs:
            dims: ${shared.post_process_dims}
    embed_s_and_f:
      cls: LearnableEmbedding
      kwargs:
        map:
          cls: ${shared.pe_cls}
          kwargs: 
            embed_dim: ${shared.pe_dim}
        post_process:
          cls: MLP
          kwargs:
            dims: ${shared.post_process_dims}
    enc_ctx_local:
      cls: TransformerEncoder
    enc_ctx_global:
      cls: TransformerEncoder
    cross_attn:
      cls: MultiheadAttention
    dec_z_mu:
      cls: MLP
      kwargs:
        dims: ${shared.dec_dims}
        p_dropout: 0.0
    dec_z_log_var:
      cls: MLP
      kwargs:
        dims: ${shared.dec_dims}
        p_dropout: 0.0
    dec_f_mu:
      cls: MLP
      kwargs:
        dims: ${shared.dec_dims}
        p_dropout: 0.0
    dec_f_log_var:
      cls: MLP
      kwargs:
        dims: ${shared.dec_dims}
        p_dropout: 0.0
